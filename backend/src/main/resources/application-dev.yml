spring:
  datasource:
    # In-memory H2 in MySQL compatibility mode. Data lives for the process only.
    #
    # Local MySQL is deliberately NOT used: this machine's only MySQL is
    # MySQLPodsys (another project's production DB — strictly off-limits), and a
    # second local instance would be 8.4 while production runs 8.0. MySQL 8.0
    # dialect fidelity is covered by a CI service container instead.
    #
    # File-backed H2 was considered for cross-restart persistence but conflicts
    # with spring.sql.init below (mode: always re-runs CREATE TABLE on every
    # start). Doing it properly means putting the H2 schema under Flyway with its
    # own migration location — a separate change, not needed for local E2E.
    url: jdbc:h2:mem:lynxiglam;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE,DAY;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/dev/schema-h2.sql
      data-locations: classpath:db/migration/V2__seed.sql
  jpa:
    hibernate:
      ddl-auto: none

server:
  address: 127.0.0.1
  servlet:
    session:
      cookie:
        secure: false

app:
  # Local-only default admin, seeded by AdminBootstrap (dev/local profiles only).
  admin:
    email: admin@lynxiglam.local
    password: admin@lynxiglam.local
