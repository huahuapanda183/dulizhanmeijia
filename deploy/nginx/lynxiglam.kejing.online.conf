# /etc/nginx/sites-available/lynxiglam.kejing.online
#
# Tenant vhost: lynxiglam.kejing.online -> Next 127.0.0.1:3001 + Spring 127.0.0.1:8090
# Requires: /etc/nginx/conf.d/lynxiglam-shared.conf (upstreams, zones, geo, map)
#
# ===================== NEIGHBOUR-SAFETY INVARIANTS =====================
#  * NO `default_server` on any listen line.
#  * server_name is exactly one host; no wildcards, no regex.
#  * Every http-context name is lg_-prefixed (see lynxiglam-shared.conf).
#  * Logs land in /var/log/nginx/*.log and are therefore already covered by the
#    EXISTING /etc/logrotate.d/nginx — no new logrotate file, no shared edit.
#    (VERIFY: grep -n 'var/log/nginx' /etc/logrotate.d/nginx)
#  * Apply with: nginx -t && systemctl reload nginx     <- NEVER `restart`.
# =======================================================================

server {
    listen      80;
    listen      [::]:80;
    server_name lynxiglam.kejing.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/lynxiglam-acme;
        default_type "text/plain";
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    # nginx >= 1.25.1 syntax. Ubuntu 24.04 ships 1.24 -> `nginx -v` FIRST.
    # On 1.24, delete the `http2 on;` line and use: listen 443 ssl http2;
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name lynxiglam.kejing.online;

    ssl_certificate     /etc/letsencrypt/live/lynxiglam.kejing.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lynxiglam.kejing.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    # Self-contained on purpose: no include of /etc/letsencrypt/options-ssl-nginx.conf,
    # so this vhost does not depend on a certbot-managed shared file.

    server_tokens off;
    include /etc/nginx/snippets/lynxiglam-security-headers.conf;

    # Own access log => own analytics, and never mixed with podsys's.
    access_log /var/log/nginx/lynxiglam.access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/lynxiglam.error.log warn;

    # No upload endpoint exists in this app. 1m is generous for the largest JSON
    # body (an order). Small body caps are a memory-DoS control on a Swap=0 box.
    client_max_body_size    1m;
    client_body_buffer_size 16k;
    client_body_timeout     10s;
    client_header_timeout   10s;
    send_timeout            30s;
    keepalive_timeout       65s;

    limit_conn lg_conn 20;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/rss+xml image/svg+xml application/manifest+json;

    # ---------- shared proxy defaults ----------
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    # $remote_addr, NOT $proxy_add_x_forwarded_for: the app runs with
    # server.forward-headers-strategy=framework (application.yml:24), so Tomcat
    # TRUSTS X-Forwarded-*. Appending would let a client prepend a forged hop.
    # Overwriting makes the header unspoofable.
    proxy_set_header   X-Forwarded-For   $remote_addr;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering       on;
    proxy_buffers         8 16k;
    proxy_buffer_size     16k;
    # next.config.ts leaves poweredByHeader:true -> strip the version leak.
    proxy_hide_header  X-Powered-By;

    # ================= DENY: internal surfaces never go public =================
    # Actuator: SecurityConfig.java:52 permitAll's /actuator/health/**, and the
    # backend context-path is /api, so WITHOUT this block /api/actuator/health
    # would be world-readable through the proxy. 404 at the edge instead.
    location ^~ /api/actuator { return 404; }
    # Swagger/OpenAPI: SecurityConfig.java:53 permitAll's these. §7 disables
    # springdoc in the prod profile; this is the belt to that suspenders.
    location ^~ /api/v3/api-docs { return 404; }
    location ^~ /api/swagger-ui  { return 404; }
    location = /api/swagger-ui.html { return 404; }

    # ================= RATE-LIMITED ENDPOINTS =================
    # Exact (=) matches beat the /api/ prefix match. Each carries the per-IP zone
    # plus, for the BCrypt-12 endpoints, the site-wide cap. nginx enforces every
    # limit_req present; the most restrictive wins.

    # BCrypt-12 verify on an unauthenticated endpoint == a CPU lever.
    location = /api/account/login {
        limit_req zone=lg_login        burst=5  nodelay;
        limit_req zone=lg_auth_global  burst=60 nodelay;
        proxy_pass http://lg_api;
    }
    location = /api/admin/login {
        limit_req zone=lg_adminlogin   burst=3  nodelay;
        limit_req zone=lg_auth_global  burst=60 nodelay;
        proxy_pass http://lg_api;
    }
    # BCrypt-12 *encode* — same cost, and it also writes a customer row.
    location = /api/account/register {
        limit_req zone=lg_register     burst=3  nodelay;
        limit_req zone=lg_auth_global  burst=60 nodelay;
        proxy_pass http://lg_api;
    }
    location = /api/newsletter/subscribe {
        limit_req zone=lg_newsletter   burst=5  nodelay;
        proxy_pass http://lg_api;
    }
    # Writes an order + lines in one transaction; idempotency_key UNIQUE already
    # dedupes retries, this bounds the write rate.
    location = /api/orders {
        limit_req zone=lg_orders       burst=10 nodelay;
        proxy_pass http://lg_api;
    }
    # Fire-and-forget telemetry: high legitimate volume (a PDP view fires
    # several), so the ceiling is high — but not absent, because it is an
    # unauthenticated DB-write path.
    location = /api/analytics/events {
        limit_req zone=lg_events       burst=60 nodelay;
        proxy_pass http://lg_api;
    }

    # ================= API (everything else) =================
    # No trailing slash / no URI part on proxy_pass => the original URI is passed
    # through verbatim, which is required: the backend's context-path IS /api
    # (application.yml:18). Rewriting to strip /api would 404 every route.
    location /api/ {
        proxy_pass http://lg_api;
    }

    # ================= STATIC (never touches Node) =================
    # 137MB of assets (123MB images + 14MB videos). Serving these from nginx
    # keeps them entirely out of the 512MB Node cgroup and gives proper range
    # requests for the hover videos. next/image is unused (verified), so there
    # is no optimizer to route around.
    location ^~ /_next/static/ {
        alias /opt/lynxiglam/current/web/.next/static/;
        expires 1y;
        access_log off;
        include /etc/nginx/snippets/lynxiglam-security-headers.conf;  # re-include: see snippet header
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri @lg_web_fallback;
    }
    location ^~ /images/ {
        alias /opt/lynxiglam/current/web/public/images/;
        expires 30d;
        access_log off;
        include /etc/nginx/snippets/lynxiglam-security-headers.conf;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri @lg_web_fallback;
    }
    location ^~ /videos/ {
        alias /opt/lynxiglam/current/web/public/videos/;
        expires 30d;
        access_log off;
        include /etc/nginx/snippets/lynxiglam-security-headers.conf;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri @lg_web_fallback;
    }
    location @lg_web_fallback { proxy_pass http://lg_web; }

    # ================= STOREFRONT =================
    location / {
        proxy_pass http://lg_web;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/lynxiglam-acme;
        default_type "text/plain";
    }

    # 429 as JSON, matching the backend's error envelope {code,message,fields,
    # timestamp} — src/lib/api/config.ts parses the body and reads .message.
    # An HTML 429 page would degrade to a bare status string in the UI.
    error_page 429 = @lg_rate_limited;
    location @lg_rate_limited {
        default_type application/json;
        add_header Retry-After 30 always;
        return 429 '{"code":"rate_limited","message":"Too many requests. Please slow down and try again shortly.","fields":{}}';
    }
}
