# /etc/nginx/snippets/lynxiglam-security-headers.conf
#
# FOOTGUN THIS FILE EXISTS TO DEFUSE: nginx add_header does NOT merge — a
# location with ANY add_header of its own silently DROPS every add_header
# inherited from server {}. So this snippet is included at server level AND
# re-included in every location that adds a header of its own.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# includeSubDomains here scopes to *.lynxiglam.kejing.online only — it CANNOT
# affect pod.kejing.online or kejing.online (they are siblings, not children).
# `preload` is deliberately omitted: it is effectively irreversible and would
# require submitting the parent domain.
# Rollout tip: ship max-age=300 first, verify, then raise to 31536000.

add_header X-Content-Type-Options    "nosniff" always;
add_header X-Frame-Options           "DENY" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header X-Robots-Tag              "index, follow" always;

# CSP notes:
#  - 'unsafe-inline' in script-src is required by Next's inline bootstrap/RSC
#    payload; this app defines no CSP nonce plumbing.
#  - 'unsafe-eval' is intentionally ABSENT. Next 16 production should not need
#    it. VERIFY in the browser console; only add it if a real violation appears.
#  - next/font/google (src/app/layout.tsx:2, Sofia_Sans) self-hosts fonts at
#    build time -> font-src 'self' is sufficient at runtime.
#  - The app references no external origins (verified: zero https:// hosts in
#    src/), and next/image is unused, so default-src 'self' holds.
#  - media-src covers public/videos/*.mp4 (14MB of hover videos).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
