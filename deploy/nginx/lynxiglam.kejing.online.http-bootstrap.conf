# /etc/nginx/sites-available/lynxiglam.kejing.online
# PHASE A — install this FIRST, only long enough to pass the ACME HTTP-01
# challenge. Replaced by the TLS block (lynxiglam.kejing.online.conf) immediately
# after certonly succeeds.
#
# NO default_server ANYWHERE. Adding it would hijack every unmatched Host on the
# box, breaking pod.kejing.online / kejing.online / kejing.site.
server {
    listen      80;
    listen      [::]:80;
    server_name lynxiglam.kejing.online;

    server_tokens off;
    access_log /var/log/nginx/lynxiglam.access.log;
    error_log  /var/log/nginx/lynxiglam.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/lynxiglam-acme;
        default_type "text/plain";
    }

    # Nothing else is served yet. 503 keeps a half-built site out of Google's
    # index and out of users' hands during the window before the app is up.
    location / { return 503; }
}
