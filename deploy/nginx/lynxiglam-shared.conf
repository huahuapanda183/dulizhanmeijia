# /etc/nginx/conf.d/lynxiglam-shared.conf
#
# http-context objects for the lynxiglam.kejing.online tenant.
#
# PRE-FLIGHT (do not install this file until both are confirmed):
#   1) grep -n 'include /etc/nginx/conf.d' /etc/nginx/nginx.conf
#      -> must exist INSIDE the http {} block.
#   2) nginx -T | grep -E '^\s*(upstream|limit_req_zone|limit_conn_zone|geo|map)\b'
#      -> must show NO existing name starting with lg_ (collision = total outage).
#
# Every identifier here is lg_-prefixed for exactly that reason.
#
# This file declares ONLY named objects (upstreams, zones, geo/map variables).
# Scalar http-context directives were moved into the server block of
# lynxiglam.kejing.online.conf and MUST NOT come back here. Two reasons, both
# confirmed against the live host on 2026-07-21:
#
#   * DUPLICATE = OUTAGE. /etc/nginx/conf.d/podsys-ratelimit.conf already sets
#     `limit_req_status 429;` at http context. conf.d is read in lexical order
#     and "lynxiglam-" sorts before "podsys-", so ours would have parsed first
#     and podsys's would become the duplicate:
#         [emerg] "limit_req_status" directive is duplicate
#     nginx -t then fails for the WHOLE tree. Running workers survive, so
#     nothing looks broken — until the next restart, reboot, or certbot renewal
#     hook reloads nginx, at which point every site on the box goes down
#     (pod.kejing.online, kejing.online, kejing.site, kejing.duckdns.org,
#     btc-radar).
#
#   * INHERITANCE. http-context scalars are inherited by every server block
#     that does not override them, so `ssl_session_tickets off` here would
#     silently disable TLS session tickets for the neighbours' vhosts too.

upstream lg_web { server 127.0.0.1:3001; keepalive 16; }
upstream lg_api { server 127.0.0.1:8090; keepalive 16; }

# Loopback exemption. Next SSR (and `next build`'s generateStaticParams) fetch
# https://lynxiglam.kejing.online/api and arrive here from 127.0.0.1. An empty
# key makes limit_req/limit_conn skip the request entirely — otherwise our own
# SSR would rate-limit itself off the air.
geo $lg_client_key {
    default        $binary_remote_addr;
    127.0.0.1/32   "";
    ::1/128        "";
}

# Site-wide (not per-IP) key for the CPU-expensive auth endpoints.
# Rationale: per-IP limits do NOT stop a distributed BCrypt-12 flood — 1000 IPs
# at 10 req/min each is ~50 cores of BCrypt on a box with 12. This global cap
# bounds total BCrypt work regardless of source count. It is deliberately a
# self-DoS lever (an attacker can saturate it and lock out real sign-ins); on a
# Swap=0 shared host, degrading OUR login beats OOM-killing podsys. The second
# backstop is CPUQuota=200% in lynxiglam-api.service.
map $lg_client_key $lg_auth_global_key {
    default  "lg_auth";
    ""       "";
}

# --- Per-IP zones (1m ~= 16k IPs; 7 zones ~= 7MB, not 70MB) ---
limit_req_zone  $lg_client_key        zone=lg_login:1m       rate=10r/m;
limit_req_zone  $lg_client_key        zone=lg_adminlogin:1m  rate=5r/m;
limit_req_zone  $lg_client_key        zone=lg_register:1m    rate=5r/m;
limit_req_zone  $lg_client_key        zone=lg_newsletter:1m  rate=10r/m;
limit_req_zone  $lg_client_key        zone=lg_orders:1m      rate=20r/m;
limit_req_zone  $lg_client_key        zone=lg_events:1m      rate=120r/m;
limit_conn_zone $lg_client_key        zone=lg_conn:1m;

# --- Global auth cap: 120 BCrypt-12 ops/min ~= 0.6 core, hard ceiling ---
limit_req_zone  $lg_auth_global_key   zone=lg_auth_global:1m rate=120r/m;
